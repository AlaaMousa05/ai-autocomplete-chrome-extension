<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Autocomplete Settings</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        padding: 16px;
        width: 320px;
        background: #0f172a;
        color: #f8fafc;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      label {
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
        color: #cbd5e1;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #111827;
        color: inherit;
        margin-bottom: 10px;
      }

      button {
        width: 100%;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font-weight: 600;
      }

      button:hover {
        background: #1d4ed8;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #93c5fd;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>AI Autocomplete</h1>
    <label for="apiKey">OpenRouter API Key</label>
    <input id="apiKey" type="password" placeholder="sk-or-..." />
    <button id="saveButton" type="button">Save</button>
    <div id="status" class="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
